<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Buddy - MoodWise</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/feature.css">
    <link rel="stylesheet" href="css/chat.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="feature-page">
    <header class="main-header">
        <a href="index.html" class="logo">
            <span class="mood">Mood</span><span class="wise">Wise</span>
        </a>
    </header>

    <div class="feature-content">
        <h1>Chat Buddy</h1>
        <div class="chat-container">
            <div class="chat-box" id="chat-box"></div>
            <div class="input-box">
                <input type="text" id="user-input" class="chat-input" placeholder="Chat with me..." onkeypress="handleKeyPress(event)">
                <button class="chat-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
        <a href="index.html#features" class="back-link">← Back to Activities</a>
    </div>

    <script src="js/chat.js"></script>
</body>
</html>
